<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:88px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.8;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
/* ── sidebar ── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;padding-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--sbText);padding:3px 4px;width:100%;
  cursor:pointer;transition:all .25s;}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(212,196,168,.4);display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:15px;font-weight:600;transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;
  letter-spacing:1px;opacity:.75;}
.sb-item:hover .sb-circle{border-color:var(--goldL);color:var(--goldL);}
.sb-item.active .sb-circle{background:var(--gold);border-color:var(--gold);
  color:#fff;box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{opacity:1;color:var(--goldL);}
#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:200;
  width:42px;height:42px;border-radius:8px;border:1px solid var(--border);
  background:var(--sbBg);color:var(--goldL);font-size:19px;cursor:pointer;}
/* ── main ── */
.main{margin-left:var(--sbW);}
/* ── hero ── */
.site-hero{position:relative;overflow:hidden;background:var(--headGrad);
  color:#f5edd8;text-align:center;padding:96px 24px 80px;}
.site-hero::before{content:"般若";position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);font-size:380px;opacity:.035;color:#fff;
  font-weight:900;white-space:nowrap;pointer-events:none;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:8px;color:var(--goldL);margin-bottom:18px;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:6px;color:var(--goldL);
  margin-bottom:16px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.hero-subtitle{font-size:20px;letter-spacing:3px;color:#e8dcc0;margin-bottom:10px;}
.hero-sub{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:2px;
  color:rgba(232,220,192,.85);margin-bottom:8px;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:2px;
  color:rgba(212,168,75,.9);margin-top:14px;}
.hero-line{width:120px;height:2px;margin:26px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
/* ── preface ── */
.preface{max-width:860px;margin:54px auto 10px;padding:0 28px;}
.preface h2{font-size:30px;text-align:center;color:var(--accent);
  letter-spacing:6px;margin-bottom:26px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin-bottom:16px;
  text-indent:2em;}
/* ── toc ── */
.toc-section{max-width:1100px;margin:50px auto 20px;padding:0 28px;}
.toc-title{font-size:34px;text-align:center;color:var(--accent);
  letter-spacing:8px;font-weight:700;margin-bottom:10px;}
.toc-desc{font-family:"Noto Sans TC",sans-serif;font-size:17px;text-align:center;
  color:var(--text-muted);letter-spacing:2px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toc-card{display:flex;align-items:flex-start;gap:14px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:18px 20px;
  text-decoration:none;color:var(--text);transition:all .25s;
  box-shadow:0 1px 3px var(--shadow);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(91,58,41,.15);
  border-color:var(--gold);}
.toc-num{flex:0 0 38px;width:38px;height:38px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:17px;font-weight:700;
  font-family:"Noto Serif TC",serif;}
.toc-name{font-size:19.5px;line-height:1.7;font-weight:600;}
.toc-name small{display:block;font-family:"Noto Sans TC",sans-serif;
  font-size:13.5px;font-weight:400;color:var(--text-muted);margin-top:5px;
  letter-spacing:.5px;}
/* ── chapters ── */
.chapter{margin:60px 0 0;}
.ch-head{background:var(--headGrad);color:#f5edd8;text-align:center;
  padding:54px 24px 46px;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:4px;
  color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:34px;font-weight:900;letter-spacing:4px;margin-bottom:12px;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:2px;
  color:rgba(232,220,192,.8);}
.ch-head::after{content:"";position:absolute;left:50%;bottom:22px;
  transform:translateX(-50%);width:90px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-body{max-width:980px;margin:0 auto;padding:36px 26px 30px;}
/* ── bridge ── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
/* ── iframe ── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:block;text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:17px;letter-spacing:2px;color:var(--accent);text-decoration:none;
  margin:18px auto 0;padding:10px 0;transition:color .25s;}
.next-link:hover{color:var(--gold);}
/* ── progress capsule ── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
/* ── back top ── */
#backTop{position:fixed;right:22px;bottom:24px;width:44px;height:44px;
  border-radius:50%;border:1px solid rgba(184,134,11,.5);
  background:rgba(30,26,20,.92);color:var(--goldL);font-size:18px;
  cursor:pointer;z-index:130;display:none;transition:all .25s;}
#backTop:hover{background:var(--gold);color:#fff;}
/* ── footer ── */
.site-footer{background:var(--headGrad);color:rgba(232,220,192,.75);
  text-align:center;padding:48px 24px 44px;margin-top:64px;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:2px;
  line-height:2.2;}
.site-footer .ft-title{color:var(--goldL);font-size:18px;letter-spacing:4px;
  margin-bottom:10px;font-family:"Noto Serif TC",serif;font-weight:700;}
/* ── rwd ── */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;}
  .ch-name{font-size:26px;}
  .site-hero{padding:72px 18px 56px;}
  .ch-head{padding:42px 18px 38px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:30px;}
  .preface p{font-size:16.5px;}
}

/* wy-cross-nav-css v1 */
/* ── 跨卷導覽（側欄底部）── */
.sb-cross{display:flex;flex-direction:column;align-items:center;gap:8px;

.sb-cross::before{content:"";position:absolute;top:0;left:14%;right:14%;

.sb-x{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--sbText,#d4c4a8);padding:4px 4px;width:100%;
  border-radius:7px;transition:all .25s;}
.sb-x:hover{background:rgba(184,134,11,.14);transform:translateY(-1px);}
.sb-x-glyph{width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1.2px solid rgba(212,196,168,.55);

.sb-x-label{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;

.sb-x:hover .sb-x-label{color:var(--goldL,#d4a84b);opacity:1;}
.sb-x-hub .sb-x-glyph{background:linear-gradient(135deg,

  font-weight:700;letter-spacing:1px;}

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-65-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();

  }
  if(hits.length){
    h+='<div class="wys-head">品名 · '+hits.length+' 筆 <span class="wys-hint">直達該品</span></div>';
    for(var r=0;r<Math.min(hits.length,10);r++){var k=hits[r][0],pin=hits[r][1];
      h+=row('','' +esc(label(k))+'・品'+pin.p,baseOf(k)+'#'+vols[k].a+'-'+pin.p,hlAll(pin.t,vm?[]:ts));}
    if(hits.length>10)h+='<div class="wys-more">…品名另有 '+(hits.length-10)+' 筆</div>';
  }
  if(!vm&&!pure&&ts.length&&q.length>=2){
    var nds=IDX.nodes||{},perk={},tot=0;
    var nkeys=Object.keys(nds);
    nkeys.sort(function(a,b){return (a==='zl'?-1:b==='zl'?1:parseInt(a,10)-parseInt(b,10));});
    nkeys.forEach(function(k){
      if(tot>=160)return;
      for(var bi=0;bi<nds[k].length;bi++){var nd=nds[k][bi];
        if(matchAll(nd.t,ts)){(perk[k]=perk[k]||[]).push(nd);tot++;
          if(perk[k].length>=8)break;}}
    });
    var nh=[],ord=Object.keys(perk),rd=0,added=true;
    while(nh.length<60&&added){added=false;
      for(var oi=0;oi<ord.length;oi++){var pa=perk[ord[oi]];
        if(pa.length>rd){nh.push([ord[oi],pa[rd]]);added=true;}}
      rd++;}
    if(nh.length){
      h+='<div class="wys-head">原典節點 · '+nh.length+' 筆 <span class="wys-hint">直達該節</span></div>';
      for(var r2=0;r2<Math.min(nh.length,10);r2++){var kk=nh[r2][0],nd=nh[r2][1];
        h+=row('wys-tag3',esc(label(kk)),baseOf(kk)+'#'+esc(nd.a),hlAll(nd.t,ts));}
      if(nh.length>10)h+='<div class="wys-more">…節點另有 '+(nh.length-10)+' 筆</div>';
    }
    var es2=IDX.essays||[],eh=[];
    for(var c2=0;c2<es2.length&&eh.length<40;c2++){var it3=es2[c2];
      if(matchAll(it3.t+' '+it3.x,ts))eh.push(it3);}
    if(eh.length){
      h+='<div class="wys-head">系列導讀 · '+eh.length+' 篇 <span class="wys-hint">開啟文章</span></div>';
      for(var r4=0;r4<Math.min(eh.length,8);r4++){var it4=eh[r4];
        h+=row('wys-tag4','導讀 '+it4.n,'https://weiwen0925.github.io/medium-import-'+it4.n+'.html',
          '<span class="wys-tt">'+esc(it4.t.slice(0,30))+'</span><br>'+hlAll(snippet(it4.x,ts),ts));}
      if(eh.length>8)h+='<div class="wys-more">…導讀另有 '+(eh.length-8)+' 篇</div>';
    }
    if(!ZI){h+='<div class="wys-head">總表內容 · 索引載入中…</div>';loadZb();}
    else{
      var zh=[];
      for(var z=0;z<ZI.length&&zh.length<80;z++){var it=ZI[z];
        if(matchAll(it.title+' '+it.txt,ts))zh.push(it);}
      if(zh.length){
        h+='<div class="wys-head">總表內容 · '+zh.length+' 筆 <span class="wys-hint">達該品(右下有總表鈕)</span></div>';
        for(var r3=0;r3<Math.min(zh.length,12);r3++){var it2=zh[r3];
          var vk=vols[it2.k];
          h+=row('wys-tag2',esc(label(it2.k))+'・品'+it2.p,baseOf(it2.k)+'#'+((vk&&vk.a)||'chapter')+'-'+it2.p,
            '<span class="wys-tt">'+esc(it2.title.slice(0,26))+'</span><br>'+hlAll(snippet(it2.txt,ts),ts));}
        if(zh.length>12)h+='<div class="wys-more">…總表另有 '+(zh.length-12)+' 筆</div>';
      }
    }
  }
  sres.innerHTML=h||'<div class="wys-head">無結果 · 換個關鍵詞試試</div>';
}
var timer=null;
sin.addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(render,220);});
sin.addEventListener('search',render);
function smClose(){sm.classList.remove('show');document.documentElement.style.overflow='';}
idoc.addEventListener('keydown',function(e){if(e.key==='Escape')smClose();});
fab.addEventListener('click',function(){sm.classList.add('show');document.documentElement.style.overflow='hidden';
  loadIdx();setTimeout(function(){try{sin.focus();}catch(e){}},60);});
sm.addEventListener('click',function(e){if(e.target===sm)smClose();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&sm.classList.contains('show'))smClose();});
function fabPlace(){ /* 避讓左側固定導覽欄(sb-nav 等):排到欄右側 12px */
  var right=0,cands=document.querySelectorAll('[class*="sb"],[class*="side"],[class*="rail"],nav,aside');
  for(var i=0;i<cands.length;i++){var el=cands[i];
    if(el===fab||sm.contains(el))continue;
    var st;try{st=getComputedStyle(el);}catch(_){continue;}
    if(st.position!=='fixed'&&st.position!=='sticky')continue;
    var r=el.getBoundingClientRect();
    if(r.left<48&&r.width>0&&r.width<150&&r.height>200&&r.right>right)right=r.right;
  }
  fab.style.left=(right>0?Math.round(right)+12:24)+'px';
}
function fabShow(){fab.classList.toggle('show',window.scrollY>250);fabPlace();}
setInterval(fabPlace,1500);
window.addEventListener('scroll',fabShow,{passive:true});
setTimeout(fabShow,600);setTimeout(fabShow,2000);
})();
</script>
<!--WY-SEARCH:END-->
